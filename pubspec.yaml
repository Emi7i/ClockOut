name: clock_app
description: Work clock-in / clock-out app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1

  # Data layer
  sqflite: ^2.3.3
  path: ^1.9.0

  # Alarms
  alarm: ^5.4.1

  # Permissions (exact alarm / notification access)
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true

  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Caveat-SemiBold.ttf
          weight: 600

  assets:
    - assets/alarm.mp3
    - assets/silence.wav
    - assets/ui/
